<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Parcheggio Condominio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EEEDE8;
    --text: #1A1A18; --text2: #6B6B65; --text3: #9E9E96;
    --border: rgba(0,0,0,0.08);
    --accent: #1A1A18;
    --green: #2D7A4F; --green-bg: #E8F5EE;
    --red: #C0392B; --red-bg: #FDECEA;
    --amber: #B8720A; --amber-bg: #FEF5E4;
    --blue: #1A5FAB; --blue-bg: #E8F0FB;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; }

  .app-header { background: var(--surface); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .app-logo { display: flex; align-items: center; gap: 10px; }
  .app-logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .app-logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .app-logo-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .header-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; padding: 6px 10px; background: var(--surface2); border-radius: var(--radius-sm); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: white; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; color: var(--text3); cursor: pointer; padding: 4px 0; transition: color 0.2s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }

  .main { padding: 16px 16px 90px; }
  .screen { display: none; }
  .screen.active { display: block; }

  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

  /* DATE NAV */
  .date-nav { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 16px; margin-bottom: 12px; }
  .date-nav-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: background 0.15s; }
  .date-center { text-align: center; }
  .date-main { font-size: 16px; font-weight: 600; }
  .date-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* TIMELINE */
  .timeline-container { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; overflow: hidden; }
  .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .timeline-title { font-size: 13px; font-weight: 600; color: var(--text2); }
  .timeline-wrap { position: relative; }
  .timeline-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; padding: 0 2px; }
  .timeline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .timeline-post-label { font-size: 12px; font-weight: 600; color: var(--text2); width: 20px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .timeline-track { flex: 1; height: 32px; background: var(--surface2); border-radius: 6px; position: relative; overflow: hidden; cursor: pointer; }
  .timeline-block { position: absolute; top: 2px; bottom: 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; overflow: hidden; white-space: nowrap; }
  .timeline-block.taken { background: #D1D0CB; color: var(--text3); }
  .timeline-block.mine { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(26,95,171,0.3); }
  .timeline-block.mine-pending { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(184,114,10,0.3); }
  .timeline-block.blocked { background: var(--amber-bg); color: var(--amber); }
  .timeline-block.night { background: #2C2C3A; color: #9090B0; }
  .timeline-block.mine-night { background: var(--blue); color: white; }
  .timeline-free-hint { font-size: 11px; color: var(--green); text-align: center; margin-top: 4px; }

  /* BOOKING CARD (new) */
  .book-section { margin-bottom: 16px; }
  .book-section-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .time-btn { padding: 10px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--text2); background: var(--surface); font-family: 'DM Mono', monospace; }
  .time-btn:active { transform: scale(0.96); }
  .time-btn.selected { border-color: var(--accent); background: var(--accent); color: white; }
  .time-btn.disabled { opacity: 0.3; cursor: not-allowed; background: var(--surface2); }
  .night-btn { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .night-btn.selected { border-color: #4A4A6A; background: #2C2C3A; color: #C0C0E0; }

  /* SLOT TAGS */
  .tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .tag-free { background: var(--green-bg); color: var(--green); }
  .tag-taken { background: var(--surface2); color: var(--text3); }
  .tag-mine { background: var(--blue-bg); color: var(--blue); }
  .tag-pending { background: var(--amber-bg); color: var(--amber); }
  .tag-blocked { background: var(--amber-bg); color: var(--amber); }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px max(20px, env(safe-area-inset-bottom)); width: 100%; max-width: 430px; animation: slideUp 0.25s ease; max-height: 92vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--surface2); margin: 0 auto 18px; }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input.mono { font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; }

  /* BUTTONS */
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red-bg); color: var(--red); }
  .btn-green { background: var(--green); color: white; }
  .btn + .btn { margin-top: 8px; }

  /* PIN */
  .pin-display { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .numpad-btn { padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); font-size: 20px; cursor: pointer; text-align: center; transition: background 0.1s; }
  .numpad-btn:active { background: var(--accent); color: white; }

  /* INFO ROWS */
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-row-label { color: var(--text2); }
  .info-row-value { font-weight: 500; text-align: right; }

  /* PRENOTAZIONI LIST */
  .booking-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: start; gap: 12px; }
  .booking-item.pending { border-color: var(--amber); }
  .booking-item-info {}
  .booking-item-title { font-size: 15px; font-weight: 600; }
  .booking-item-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .booking-item-plate { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 2px; }
  .booking-item-pending { font-size: 11px; color: var(--amber); margin-top: 4px; }

  /* USER ITEMS */
  .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .user-item:last-child { border-bottom: none; }
  .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
  .user-info { flex: 1; }
  .user-name { font-size: 14px; font-weight: 500; }
  .user-sub { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .user-delete { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); background: var(--red-bg); color: var(--red); border: none; cursor: pointer; flex-shrink: 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }
  .spinner { width: 24px; height: 24px; margin: 0 auto 10px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 32px 16px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--text); }

  .opt-btn { padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .opt-btn.selected { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }

  /* WA FLOW */
  .wa-box { background: #E8F5E1; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; line-height: 1.6; border: 1px solid rgba(37,211,102,0.3); margin-bottom: 12px; }
  .wa-label { font-size: 11px; font-weight: 600; color: #25D366; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .wa-copied { display: none; text-align: center; padding: 10px; background: var(--green-bg); border-radius: var(--radius-sm); color: var(--green); font-size: 13px; font-weight: 500; margin-bottom: 12px; }
  .wa-copied.show { display: block; }
  .pending-note { background: var(--amber-bg); border: 1px solid rgba(184,114,10,0.2); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--amber); margin-bottom: 12px; }

  /* COUNTDOWN */
  .cbar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .cfill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 1s linear; }
  .ctext { font-size: 10px; color: var(--amber); margin-top: 3px; font-family: 'DM Mono', monospace; }

  .family-tag { display: inline-block; background: var(--blue-bg); color: var(--blue); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, deleteDoc, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fb = initializeApp({
  apiKey: "AIzaSyCLpE4VmduyGtRHlNa1pgm3AmEPHZirkDw",
  authDomain: "posticondominiobettina.firebaseapp.com",
  projectId: "posticondominiobettina",
  storageBucket: "posticondominiobettina.firebasestorage.app",
  messagingSenderId: "524400396757",
  appId: "1:524400396757:web:fab21d5db1b7f884fb555c"
});
const db = getFirestore(fb);

// ─── COSTANTI ─────────────────────────────────────────────────
const ADMIN_PIN = '0000';
const WA_GROUP = 'Condominio Bettina';
const PENDING_MS = 30 * 60 * 1000;
const POSTS = ['P1','P2'];
const DAY_START = 8;   // 08:00
const DAY_END = 21;    // 21:00
const NIGHT_LABEL = '21:00 – 08:00';

// Ore disponibili per fascia diurna (08:00 – 21:00, step 30min)
function buildTimeSlots() {
  const slots = [];
  for (let h = DAY_START; h <= DAY_END; h++) {
    slots.push(`${String(h).padStart(2,'0')}:00`);
    if (h < DAY_END) slots.push(`${String(h).padStart(2,'0')}:30`);
  }
  return slots;
}
const TIME_SLOTS = buildTimeSlots();

// ─── STATE ────────────────────────────────────────────────────
let currentUser = JSON.parse(localStorage.getItem('pkUser') || 'null');
let currentDay = 0;
let countdownTimers = {};
let loginPin = '';

// ─── UTILS ────────────────────────────────────────────────────
function dateStr(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}
function formatDateLabel(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const days = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return {
    main: offset===0?'Oggi':offset===1?'Domani':offset===-1?'Ieri':`${days[d.getDay()]} ${d.getDate()}`,
    sub: `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`
  };
}
function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function timeToMin(t) {
  const [h,m] = t.split(':').map(Number); return h*60+m;
}
function formatCountdown(ms) {
  const s = Math.max(0, Math.floor(ms/1000));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// Controlla se due prenotazioni si sovrappongono
function overlaps(a, b) {
  // night vs night
  if (a.isNight && b.isNight) return true;
  // night vs day: notte è 21:00-08:00 = 1260-480 (next day)
  // Per semplicità notte occupa 0-480 e 1260-1440
  if (a.isNight || b.isNight) {
    const day = a.isNight ? b : a;
    const ds = timeToMin(day.oraInizio), de = timeToMin(day.oraFine);
    // notte occupa 21:00-24:00 e 00:00-08:00
    return ds < 480 || de > 1260 || ds >= 1260;
  }
  // day vs day
  const as = timeToMin(a.oraInizio), ae = timeToMin(a.oraFine);
  const bs = timeToMin(b.oraInizio), be = timeToMin(b.oraFine);
  return as < be && ae > bs;
}

// ─── FIREBASE ─────────────────────────────────────────────────
async function loadBookingsForDate(date) {
  const q = query(collection(db,'prenotazioni'), where('data','==',date));
  const snap = await getDocs(q);
  const res = [];
  snap.forEach(d => res.push({id:d.id,...d.data()}));
  return res;
}
async function loadFamilies() {
  const snap = await getDocs(collection(db,'famiglie'));
  const res = [];
  snap.forEach(d => res.push({id:d.id,...d.data()}));
  return res;
}

// Cleanup: pending scaduti → confermati
async function cleanupPending(bookings) {
  for (const b of bookings) {
    if (b.tipo === 'pending' && Date.now() > b.pendingScade) {
      await setDoc(doc(db,'prenotazioni',b.id), {...b, tipo:'prenotazione'});
      b.tipo = 'prenotazione';
    }
  }
}

function buildTimeline(date, bookings) {
  // Timeline 08:00–21:00 visuale
  const totalMin = (DAY_END - DAY_START) * 60;
  const labels = [];
  for (let h = DAY_START; h <= DAY_END; h += 3) labels.push(`${String(h).padStart(2,'0')}:00`);

  let html = `<div class="timeline-container">
    <div class="timeline-header"><span class="timeline-title">☀️ Fascia diurna · 08:00 – 21:00</span>
    <button onclick="openBookModal('${date}',false)" style="font-size:12px;padding:6px 12px;border:1.5px solid var(--green);border-radius:var(--radius-sm);background:var(--green-bg);color:var(--green);cursor:pointer;font-weight:500">+ Prenota</button>
    </div>
    <div class="timeline-labels">${labels.map(l=>`<span>${l}</span>`).join('')}</div>`;

  for (const post of POSTS) {
    const postBookings = bookings.filter(b => b.posto===post && !b.isNight);
    html += `<div class="timeline-row"><span class="timeline-post-label">${post}</span><div class="timeline-track" id="track_${post}">`;
    for (const b of postBookings) {
      if (b.tipo === 'blocco') {
        const s = Math.max(0, timeToMin(b.oraInizio||'08:00') - DAY_START*60);
        const e = Math.min(totalMin, timeToMin(b.oraFine||'21:00') - DAY_START*60);
        const left = (s/totalMin*100).toFixed(1), width = ((e-s)/totalMin*100).toFixed(1);
        html += `<div class="timeline-block blocked" style="left:${left}%;width:${width}%">🔒</div>`;
        continue;
      }
      const s = Math.max(0, timeToMin(b.oraInizio) - DAY_START*60);
      const e = Math.min(totalMin, timeToMin(b.oraFine) - DAY_START*60);
      const left = (s/totalMin*100).toFixed(1), width = ((e-s)/totalMin*100).toFixed(1);
      const ismine = currentUser && b.targa===currentUser.targa;
      const isPending = b.tipo==='pending';
      const cls = ismine ? (isPending?'mine-pending':'mine') : 'taken';
      const lbl = width > 8 ? (ismine ? '✓' : b.nome.split(' ')[0]) : '';
      html += `<div class="timeline-block ${cls}" style="left:${left}%;width:${width}%" title="${b.nome} ${b.oraInizio}–${b.oraFine}">${lbl}</div>`;
    }
    html += '</div></div>';
  }
  html += `<div class="timeline-free-hint">Tocca "+ Prenota" per scegliere orario</div></div>`;
  return html;
}

function startCountdown(id, scade, ismine) {
  const tick = () => {
    const rem = scade - Date.now();
    const cf = document.getElementById('cf_'+id);
    const ct = document.getElementById('ct_'+id);
    if (!cf||!ct) { clearInterval(countdownTimers[id]); return; }
    if (rem <= 0) {
      cf.style.width='100%'; ct.textContent='Confermato!';
      clearInterval(countdownTimers[id]);
      setTimeout(()=>renderHome(), 1500);
      return;
    }
    cf.style.width = Math.max(0,rem/PENDING_MS*100)+'%';
    ct.textContent = (ismine?'Confermato tra ':'Libero tra ') + formatCountdown(rem);
  };
  tick();
  countdownTimers[id] = setInterval(tick, 1000);
}

window.openBookModal = async function(date, isNight) {
  if (!currentUser) { showAuthModal('login'); return; }

  await cleanupPending(bookings);

  // Controlla vincolo famiglia
  const famBookings = bookings.filter(b => b.famiglia===currentUser.famiglia && b.tipo!=='blocco' && b.targa!==currentUser.targa);
  if (famBookings.length > 0) {
    showModal('bookContent', `
      <div class="modal-title">Posto non disponibile</div>
      <div class="modal-sub">La famiglia <strong>${currentUser.famiglia}</strong> ha già una prenotazione attiva (${famBookings[0].nome}).<br><br>Solo una prenotazione per famiglia è consentita.</div>
      <button class="btn btn-secondary" onclick="closeModal('modalBook')">Chiudi</button>
    `);
    return;
  }

  // Controlla se l'utente stesso ha già una prenotazione oggi (doppia)
  const myBookings = bookings.filter(b => b.targa===currentUser.targa && b.tipo!=='blocco');
  const isDouble = myBookings.length > 0;

  if (isNight) {
    showNightBookModal(date, bookings, isDouble);
  } else {

  }
};

function showDayBookModal(date, bookings, isDouble) {
  let selectedStart = null, selectedEnd = null;

  const render = () => {
    const takenRanges = [];
    for (const post of POSTS) {
      bookings.filter(b=>b.posto===post&&!b.isNight&&b.tipo!=='blocco').forEach(b=>takenRanges.push({post,s:timeToMin(b.oraInizio),e:timeToMin(b.oraFine)}));
    }

    // Per ogni orario, è completamente occupato (entrambi i posti)?
    function isFullyTaken(t) {
      const tmin = timeToMin(t);
      return POSTS.every(post => {
        return bookings.filter(b=>b.posto===post&&!b.isNight&&b.tipo!=='blocco').some(b=>timeToMin(b.oraInizio)<=tmin && timeToMin(b.oraFine)>tmin);
      });
    }

    const startSlots = TIME_SLOTS.slice(0,-1); // non include 21:00 come inizio
    const endSlots = TIME_SLOTS.slice(1);       // non include 08:00 come fine

    let startHtml = startSlots.map(t => {
      const dis = isFullyTaken(t);
      const sel = t===selectedStart;
      return `<div class="time-btn${dis?' disabled':sel?' selected':''}" onclick="${dis?'':'selectStart(\''+t+'\')'}">${t}</div>`;
    }).join('');

    let endHtml = '';
    if (selectedStart) {
      endHtml = endSlots.filter(t=>t>selectedStart).map(t => {
        // Controlla se l'intervallo selectedStart–t è disponibile su almeno un posto
        const range = {oraInizio:selectedStart, oraFine:t, isNight:false};
        const available = POSTS.some(post => {
          const conflict = bookings.filter(b=>b.posto===post&&!b.isNight&&b.tipo!=='blocco').some(b=>overlaps(range,b));
          return !conflict;
        });
        const sel = t===selectedEnd;
        return `<div class="time-btn${!available?' disabled':sel?' selected':''}" onclick="${!available?'':'selectEnd(\''+t+'\')'}">${t}</div>`;
      }).join('');
    }

    const summary = selectedStart && selectedEnd
      ? `<div style="background:var(--green-bg);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;font-weight:500;color:var(--green);margin:12px 0">✓ ${selectedStart} – ${selectedEnd}</div>`
      : '<div style="height:8px"></div>';

    document.getElementById('bookContent').innerHTML = `
      <div class="modal-title">Prenota fascia diurna</div>
      <div class="modal-sub">${date}${isDouble?' · <span style="color:var(--amber)">⚠ Seconda prenotazione — richiede avviso WhatsApp</span>':''}</div>
      <div class="book-section"><div class="book-section-label">Ora inizio</div><div class="time-grid">${startHtml}</div></div>
      ${selectedStart ? `<div class="book-section"><div class="book-section-label">Ora fine</div><div class="time-grid">${endHtml}</div></div>` : ''}
      ${summary}
      <button class="btn btn-green" id="btnConfirmDay" ${(!selectedStart||!selectedEnd)?'disabled':''} onclick="confirmDayBook('${date}',${isDouble})">Conferma</button>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal('modalBook')">Annulla</button>
    `;
  };

  window.selectStart = t => { selectedStart=t; selectedEnd=null; render(); };
  window.selectEnd = t => { selectedEnd=t; render(); };
  window.confirmDayBook = async (date, isDouble) => {
    if (!selectedStart||!selectedEnd) return;
    if (isDouble) { showWaModal(date, false, selectedStart, selectedEnd); }
    else { await saveBooking(date, false, selectedStart, selectedEnd, false); }
  };

  showModal('bookContent', '');
  render();
}

window.copyMsg = function(encoded) {
  const msg = decodeURIComponent(encoded);
  const copy = () => {
    document.getElementById('waCopied').classList.add('show');
    document.getElementById('btnCopy').textContent = '✓ Copiato!';
    document.getElementById('btnConfirmWa').disabled = false;
  };
  navigator.clipboard.writeText(msg).then(copy).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value=msg; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); copy();
  });
};

async function saveBooking(date, isNight, oraInizio, oraFine, isPending) {
  // Trova il posto libero
  const bookings = await loadBookingsForDate(date);
  await cleanupPending(bookings);
  const newB = { isNight, oraInizio, oraFine };
  let assignedPost = null;
  for (const post of POSTS) {
    const conflict = bookings.filter(b=>b.posto===post&&b.tipo!=='blocco').some(b=>overlaps(newB,b));
    if (!conflict) { assignedPost = post; break; }
  }
  if (!assignedPost) { showToast('Nessun posto disponibile in quell\'orario'); closeModal('modalBook'); return; }

  const id = `${date}_${assignedPost}_${Date.now()}`;
  const data = {
    id, data: date, posto: assignedPost,
    nome: currentUser.nome, targa: currentUser.targa,
    auto: currentUser.auto||'', famiglia: currentUser.famiglia||'',
    isNight, oraInizio: isNight?'21:00':oraInizio, oraFine: isNight?'08:00':oraFine,
    tipo: isPending ? 'pending' : 'prenotazione',
    ts: Date.now(),
    ...(isPending && { pendingScade: Date.now() + PENDING_MS })
  };
  await setDoc(doc(db,'prenotazioni',id), data);
  closeModal('modalBook');
  showToast(isPending ? `${assignedPost} in attesa 30 min ⏳` : `${assignedPost} prenotato ✓`);
  renderHome();
  renderMie();
}

    return `<div class="booking-item${isPending?' pending':''}">

  }).join('');
}

        <div class="form-group"><label class="form-label">Nome e cognome</label><input id="regNome" class="form-input" placeholder="Mario Rossi"></div>
        <div class="form-group"><label class="form-label">Famiglia / Appartamento</label><select id="regFam" class="form-select"><option value="">Scegli famiglia</option>${famOpts}</select></div>
        <div class="form-group"><label class="form-label">Modello auto</label><input id="regAuto" class="form-input" placeholder="Fiat 500"></div>
        <div class="form-group"><label class="form-label">Targa</label><input id="regTarga" class="form-input mono" placeholder="AA000AA" maxlength="10"></div>
        <div class="form-group"><label class="form-label">PIN (4 cifre)</label><input id="regPin" class="form-input" style="letter-spacing:6px;font-size:20px;text-align:center;font-family:'DM Mono',monospace" placeholder="••••" maxlength="4" type="password" inputmode="numeric"></div>
        <button class="btn btn-primary" onclick="doRegister()">Registrati</button>
        <button class="btn btn-secondary" style="margin-top:8px" onclick="showAuthModal('login')">Ho già un account</button>
      `;
    });
  }
  document.getElementById('modalAuth').classList.add('open');
}

function buildNumpad(containerId, handler) {
  const el = document.getElementById(containerId);
  if (!el) return;
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k => {
    if (k==='') { el.appendChild(document.createElement('div')); return; }
    const btn = document.createElement('div');
    btn.className = 'numpad-btn';
    btn.textContent = k;
    btn.onclick = () => handler(k);
    el.appendChild(btn);
  });
}

function loginPinHandler(k) {
  if (k==='⌫') loginPin=loginPin.slice(0,-1);
  else if (loginPin.length<4) loginPin+=k;
  for(let i=0;i<4;i++) document.getElementById('pd'+i)?.classList.toggle('filled',i<loginPin.length);
  if (loginPin.length===4) doLogin();
}

async function doLogin() {
  const targa = (document.getElementById('loginTarga')?.value||'').trim().toUpperCase();
  if (!targa) { showToast('Inserisci la targa'); loginPin=''; refreshPinDots(); return; }
  if (targa==='ADMIN' && loginPin===ADMIN_PIN) {
    currentUser = {nome:'Admin',targa:'ADMIN',auto:'',famiglia:'Admin',isAdmin:true};
    localStorage.setItem('pkUser',JSON.stringify(currentUser));
    finishLogin(); return;
  }
  const snap = await getDoc(doc(db,'utenti',targa));
  if (!snap.exists()) { showToast('Utente non trovato'); loginPin=''; refreshPinDots(); return; }
  const u = snap.data();
  if (u.pin !== loginPin) { showToast('PIN errato'); loginPin=''; refreshPinDots(); return; }
  currentUser = {...u, targa};
  localStorage.setItem('pkUser',JSON.stringify(currentUser));
  finishLogin();
}
function refreshPinDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i)?.classList.toggle('filled',i<loginPin.length); }
function finishLogin() {
  loginPin='';
  closeModal('modalAuth');
  updateHeaderUser();
  if (currentUser.isAdmin) document.getElementById('navAdmin').style.display='flex';
  renderHome(); renderMie();
  showToast(`Bentornato, ${currentUser.nome.split(' ')[0]}!`);
}

window.doRegister = async function() {
  const nome = document.getElementById('regNome').value.trim();
  const famiglia = document.getElementById('regFam').value;
  const auto = document.getElementById('regAuto').value.trim();
  const targa = document.getElementById('regTarga').value.trim().toUpperCase();
  const pin = document.getElementById('regPin').value.trim();
  if (!nome||!famiglia||!targa||!pin) { showToast('Compila tutti i campi'); return; }
  if (!/^\d{4}$/.test(pin)) { showToast('PIN deve essere 4 cifre'); return; }
  const snap = await getDoc(doc(db,'utenti',targa));
  if (snap.exists()) { showToast('Targa già registrata'); return; }
  // Prendi nome famiglia
  const famSnap = await getDoc(doc(db,'famiglie',famiglia));
  const famNome = famSnap.exists() ? famSnap.data().nome : famiglia;
  await setDoc(doc(db,'utenti',targa), {nome,famiglia:famNome,auto,pin,targa});
  currentUser = {nome,famiglia:famNome,auto,targa,pin};
  localStorage.setItem('pkUser',JSON.stringify(currentUser));
  finishLogin();
};

// ─── ADMIN ────────────────────────────────────────────────────
window.switchAdminTab = function(tab) {
  ['famiglie','blocca','utenti'].forEach(t => {
    document.getElementById('admin'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab?'block':'none';
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  if (tab==='famiglie') renderAdminFamiglie();
  if (tab==='blocca') renderAdminBlocca();
  if (tab==='utenti') renderAdminUtenti();
};

async function renderAdminFamiglie() {
  const el = document.getElementById('adminFamiglie');
  const families = await loadFamilies();
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Gestisci famiglie</div>
      <div id="famList">${families.length?families.map(f=>`
        <div class="user-item">
          <div class="user-avatar">${initials(f.nome)}</div>
          <div class="user-info"><div class="user-name">${f.nome}</div></div>
          <button class="user-delete" onclick="deleteFam('${f.id}')">Rimuovi</button>
        </div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:8px 0">Nessuna famiglia</div>'}</div>
      <div style="margin-top:16px;display:flex;gap:8px">
        <input id="newFamName" class="form-input" placeholder="Nome famiglia (es. Caputo)" style="flex:1">
        <button onclick="addFam()" style="padding:12px 16px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:white;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap">+ Aggiungi</button>
      </div>
    </div>
  `;
}
window.addFam = async function() {
  const nome = document.getElementById('newFamName').value.trim();
  if (!nome) { showToast('Inserisci un nome'); return; }
  const id = nome.toLowerCase().replace(/\s+/g,'-');
  // Aggiorna UI subito, prima di aspettare Firebase
  const famList = document.getElementById('famList');
  const placeholder = famList ? famList.querySelector('[style*="Nessuna"]') : null;
  if (placeholder) placeholder.remove();
  if (famList) {
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `<div class="user-avatar">${initials(nome)}</div><div class="user-info"><div class="user-name">${nome}</div></div><button class="user-delete" onclick="deleteFam('${id}')">Rimuovi</button>`;
    famList.appendChild(div);
  }
  document.getElementById('newFamName').value = '';
  showToast('Famiglia aggiunta ✓');
  await setDoc(doc(db,'famiglie',id), {nome, id});
};
window.deleteFam = async function(id) {
  if (!confirm('Rimuovere questa famiglia?')) return;
  await deleteDoc(doc(db,'famiglie',id));
  showToast('Famiglia rimossa');
  renderAdminFamiglie();
};

let adminBlockSlot='mattina', adminBlockPost='1';
function renderAdminBlocca() {
  const el = document.getElementById('adminBlocca');
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Blocca posto per fornitore</div>
      <div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="blockDate" value="${dateStr(0)}"></div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="opt-btn selected" id="bsDay" onclick="setAdminBlockSlot('day')">☀️ Diurno</div>
          <div class="opt-btn" id="bsNight" onclick="setAdminBlockSlot('night')">🌙 Notte</div>
        </div>
      </div>
      <div id="adminDayTimes" class="form-group">
        <label class="form-label">Orario</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label class="form-label">Dalle</label><select class="form-select" id="blockFrom">${TIME_SLOTS.slice(0,-1).map(t=>`<option>${t}</option>`).join('')}</select></div>
          <div><label class="form-label">Alle</label><select class="form-select" id="blockTo">${TIME_SLOTS.slice(1).map(t=>`<option>${t}</option>`).join('')}</select></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Posto</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div class="opt-btn selected" id="bp1" onclick="setAdminBlockPost('1')">P1</div>
          <div class="opt-btn" id="bp2" onclick="setAdminBlockPost('2')">P2</div>
          <div class="opt-btn" id="bpAll" onclick="setAdminBlockPost('all')">Entrambi</div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Motivo</label><input type="text" class="form-input" id="blockReason" placeholder="es. Giardiniere"></div>
      <button class="btn btn-primary" onclick="doAdminBlock()">Blocca</button>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="doAdminUnblock()">Rimuovi blocco</button>
    </div>
  `;
}
window.setAdminBlockSlot = s => {
  adminBlockSlot = s;
  document.getElementById('bsDay').classList.toggle('selected',s==='day');
  document.getElementById('bsNight').classList.toggle('selected',s==='night');
  document.getElementById('adminDayTimes').style.display = s==='day'?'block':'none';
};
window.setAdminBlockPost = p => {
  adminBlockPost = p;
  ['1','2','All'].forEach(x => document.getElementById('bp'+x).classList.toggle('selected',p===x.toLowerCase()));
};
window.doAdminBlock = async function() {
  const date = document.getElementById('blockDate').value;
  if (!date) { showToast('Scegli una data'); return; }
  const motivo = document.getElementById('blockReason').value.trim()||'Fornitore';
  const isNight = adminBlockSlot==='night';
  const oraInizio = isNight?'21:00':document.getElementById('blockFrom')?.value||'08:00';
  const oraFine = isNight?'08:00':document.getElementById('blockTo')?.value||'21:00';
  const posts = adminBlockPost==='all'?POSTS:[`P${adminBlockPost}`];
  for (const post of posts) {
    const id = `${date}_${post}_blocco_${adminBlockSlot}`;
    await setDoc(doc(db,'prenotazioni',id), {id, data:date, posto:post, isNight, oraInizio, oraFine, motivo, tipo:'blocco', nome:'Admin', targa:'ADMIN', ts:Date.now()});
  }
  showToast('Bloccato ✓'); renderHome();
};
window.doAdminUnblock = async function() {
  const date = document.getElementById('blockDate').value;
  if (!date) { showToast('Scegli una data'); return; }
  const posts = adminBlockPost==='all'?POSTS:[`P${adminBlockPost}`];
  const bookings = await loadBookingsForDate(date);
  for (const post of posts) {
    const toDelete = bookings.filter(b=>b.posto===post&&b.tipo==='blocco'&&(adminBlockPost==='all'||(b.isNight===(adminBlockSlot==='night'))));
    for (const b of toDelete) await deleteDoc(doc(db,'prenotazioni',b.id));
  }
  showToast('Blocco rimosso'); renderHome();
};

async function renderAdminUtenti() {
  const el = document.getElementById('adminUtenti');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const snap = await getDocs(collection(db,'utenti'));
  const users = [];
  snap.forEach(d=>users.push({id:d.id,...d.data()}));
  if (!users.length) { el.innerHTML='<div class="empty-state"><div>Nessun utente</div></div>'; return; }
  el.innerHTML = `<div class="card"><div class="card-title">Utenti registrati</div>${users.map(u=>`
    <div class="user-item">
      <div class="user-avatar">${initials(u.nome)}</div>
      <div class="user-info">
        <div class="user-name">${u.nome}</div>
        <div class="user-sub">${u.targa} · <span class="family-tag">${u.famiglia||'—'}</span></div>
      </div>
      <button class="user-delete" onclick="deleteUser('${u.targa}')">Rimuovi</button>
    </div>`).join('')}</div>`;
}
window.deleteUser = async function(targa) {
  if (!confirm(`Rimuovere ${targa}?`)) return;
  await deleteDoc(doc(db,'utenti',targa));
  showToast('Utente rimosso'); renderAdminUtenti();
};

// ─── NAVIGATION ───────────────────────────────────────────────
window.switchScreen = function(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
  if (name==='Mie') renderMie();
  if (name==='Admin') { switchAdminTab('famiglie'); }
};
window.closeModal = id => { document.getElementById(id).classList.remove('open'); loginPin=''; };
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
function showModal(contentId, html) {
  if (html) document.getElementById(contentId).innerHTML = html;
  const id = contentId.replace('Content','');
  document.getElementById('modal'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('open');
}
function updateHeaderUser() {
  if (currentUser) {
    document.getElementById('headerAvatar').textContent = initials(currentUser.nome);
    document.getElementById('headerName').textContent = currentUser.nome.split(' ')[0];
  } else {
    document.getElementById('headerAvatar').textContent = '?';
    document.getElementById('headerName').textContent = 'Accedi';
  }
}

// ─── INIT ─────────────────────────────────────────────────────
updateHeaderUser();
if (currentUser?.isAdmin) document.getElementById('navAdmin').style.display='flex';
updateDateUI();
renderHome();
</script>
